enabled: true
mode: daemonset

# Enabling presets automatically configures the necessary service accounts 
# and sane defaults
presets:
  kubernetesAttributes:
    enabled: true
  hostMetrics:
    enabled: true
  kubeletMetrics:
    enabled: true

extraEnvs:
  - name: DD_API_KEY
    valueFrom:
      secretKeyRef:
        name: datadog-secret
        key: api-key

config:
  receivers:
    hostmetrics:
      scrapers:
        cpu:
          metrics:
            system.cpu.logical.count:
              enabled: true # this is disabled by default, but we need to map system.cpu.num_cores

    kubeletstats:
      collection_interval: 15s
      auth_type: 'serviceAccount'
      endpoint: '${env:K8S_NODE_NAME}:10250'
      node: '${env:K8S_NODE_NAME}'
      insecure_skip_verify: true
      metric_groups:
        - node
        - pod
        - container
        - volume
      metrics:
        k8s.container.cpu.node.utilization:
          enabled: true
        k8s.pod.cpu.node.utilization:
          enabled: true
        k8s.container.memory.node.utilization:
          enabled: true
        k8s.pod.memory.node.utilization:
          enabled: true
          
  processors:
    cumulativetodelta: {}
    deltatorate:
      metrics:
        - k8s.pod.network.io
        - k8s.pod.network.errors

    k8s_attributes:
      auth_type: "serviceAccount"
      extract:
        otel_annotations: true
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.container.name
          - service.namespace
          - service.name
          - service.version
          - service.instance.id
          - container.id
          - container.image.name
          - container.image.tag
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        - sources:
            - from: connection
    
    # Detects k8s.cluster.name (gcp, eks, aks) and k8s.cluster.uid (kubeadm).
    # Adjust the k8s.cluster.name settings below for your cloud provider.
    # If your cloud provider is not supported, use the optional resource/add-cluster-name processor below instead.
    # See: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/v0.152.0/processor/resourcedetectionprocessor#cluster-name
    resourcedetection:
      detectors: ["k8snode", "ec2", "eks", "aks", "gcp", "kubeadm"]
      override: false
      # kubeadm adds k8s.cluster.uid; k8s.cluster.name is disabled to prevent the detector
      # from searching for the kubeadm-config ConfigMap on non-kubeadm clusters.
      # If running on a kubeadm cluster, set k8s.cluster.name.enabled to true.
      kubeadm:
        resource_attributes:
          k8s.cluster.name:
            enabled: false
      eks:
        resource_attributes:
          k8s.cluster.name:
            enabled: true
      aks:
        resource_attributes:
          k8s.cluster.name:
            enabled: true
      gcp:
        resource_attributes:
          k8s.cluster.name:
            enabled: true

    # Manually inject the cluster name if your cloud provider is not supported by the resourcedetection processor.
    # resource/add-cluster-name:
    #   attributes:
    #     - key: k8s.cluster.name
    #       value: <YOUR_CLUSTER_NAME>
    #       action: upsert
  
    
    memory_limiter:
      check_interval: 5s
      limit_percentage: 75
      spike_limit_percentage: 15

  connectors:
    datadog/connector:
      traces:
  
  exporters:
    datadog/exporter:
      api:
        key: ${env:DD_API_KEY}

  service:
    pipelines:
      traces: 
        receivers: [otlp]
        exporters: [datadog/connector]

      metrics:
        receivers: [datadog/connector, otlp]
        processors: [resourcedetection, k8s_attributes, cumulativetodelta, deltatorate]
        exporters: [datadog/exporter]
