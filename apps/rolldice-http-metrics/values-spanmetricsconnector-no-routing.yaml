# Deployment values for span metrics connector without routing
global:
  useExponentialHistograms: false
  useOldConventions: false
  useSpanMetricsConnector: false
  useSpanMetricsConnectorNoRouting: true

  resourceAttributes:
    deploymentEnvironment: "otel-spanmetricsconnector-no-routing"
    hostName: "eks-host-spanmetricsconnector-no-routing"
    serviceVersion: "v1.0"

# Image configuration - using ECR registry
image:
  registry: "217139788599.dkr.ecr.us-east-2.amazonaws.com/rolldice/"
  pullPolicy: IfNotPresent

gameController:
  image:
    repository: "game-controller"
    tag: "auto"

rolling:
  image:
    repository: "rolling"
    tag: "auto"

scoring:
  image:
    repository: "scoring"
    tag: "auto"

# OpenTelemetry Collector - with Datadog integration
otelCollector:
  image:
    repository: "otel/opentelemetry-collector-contrib"
    tag: "latest"
  datadog:
    site: "datad0g.com"
    apiKeySecret:
      name: "datadog-secret-smc"
      key: "api-key"
    otlpMetricsEndpoint: "https://otlp.datad0g.com/api/v2/otlpmetrics"

# Datadog Agent for infrastructure metrics (disabled - using shared agent from main deployment)
datadogAgent:
  enabled: false

loadGenerator:
  image:
    repository: "load-generator"
    tag: "error-mix"
