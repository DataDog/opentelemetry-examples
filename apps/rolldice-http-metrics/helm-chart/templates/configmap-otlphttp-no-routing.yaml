{{- if .Values.global.useOtlpHttpNoRouting }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-config
  labels:
    app.kubernetes.io/name: otel-config
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      hostmetrics:
        # collect metrics every 10 seconds.
        collection_interval: 10s
        scrapers:
          cpu:
          disk:
          filesystem:
          memory:
          network:
          load:
          paging:
          processes:

    exporters:
      datadog/exporter:
        api:
          site: ${env:DD_SITE}
          key: ${env:DD_API_KEY}
      otlphttp:
        headers:
          "Dd-Api-Key": ${env:DD_API_KEY}
          "dd-otel-metric-config": '{"trace_metrics": {"instrumentation_metrics_calc": true}, "raw_instrumentation_metrics_drop": false}'
        metrics_endpoint: {{ .Values.otelCollector.datadog.otlpMetricsEndpoint }}
      debug:
        verbosity: detailed

    processors:
      batch:
      cumulativetodelta:
        include:
          match_type: regexp
          metrics:
            - .*
      transform/unit:
        metric_statements:
        - context: datapoint
          statements:
            - set(metric.unit, "ms") where metric.name == "http.server.duration" or metric.name == "http.client.duration" or metric.name == "http.server.request.duration"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [datadog/exporter]

        metrics:
          receivers: [otlp]
          processors: [cumulativetodelta, transform/unit]
          exporters: [otlphttp, debug]
{{- end }}
