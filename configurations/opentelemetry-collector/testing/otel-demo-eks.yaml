# FOR INTERNAL TESTING PURPOSES ONLY
# Example values.yaml file for the OpenTelemetry Demo Helm chart
# Setup: Kubernetes Daemonset in an EKS environment

# Disable other backends
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Add more Kubernetes-related resource attributes
# Note: The container name being the same as the service name is specific to the OTel Demo
default:
  envOverrides:
    - name: OTEL_K8S_POD_UID
      valueFrom:
        fieldRef:
          fieldPath: metadata.uid
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: >-
        deployment.environment.name=otel-demo,
        service.namespace=otel-demo,
        service.instance.id=$(OTEL_K8S_POD_UID),
        k8s.pod.uid=$(OTEL_K8S_POD_UID),
        k8s.container.name=$(OTEL_SERVICE_NAME)
    - name: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_EMIT_EXPERIMENTAL_TELEMETRY
      value: "true"
    - name: OTEL_INSTRUMENTATION_JMX_ENABLED
      value: "true"
    - name: OTEL_JMX_CONFIG
      value: /etc/otel-jmx/jvm.yaml

opentelemetry-collector:
  # Disable presets enabled by demo
  presets:
    hostMetrics:
      enabled: false
    kubernetesAttributes:
      enabled: false
    kubeletMetrics:
      enabled: false
    clusterMetrics:
      enabled: false
    annotationDiscovery:
      metrics:
        enabled: false

  extraEnvs:
    - name: DD_SITE
      value: datadoghq.com # Update if necessary
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: datadog-secrets
          key: api-key
  
  mode: daemonset
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.152.0
  command:
    name: "otelcol-contrib"
    extraArgs: []
  
  # Service account for the k8s_attributes processor
  serviceAccount:
    create: true
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "namespaces"]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
  
  # Volume mount for the host metrics receiver
  extraVolumes:
    - name: hostfs
      hostPath:
        path: /
  extraVolumeMounts:
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
      mountPropagation: HostToContainer
  
  # Some components take a long time to start, so set a startup probe
  startupProbe:
    initialDelaySeconds: 1
    periodSeconds: 2
    failureThreshold: 20 # 40 seconds
    httpGet:
      port: 13133
      path: /
  
  alternateConfig:
    receivers:
      # Receive telemetry from OpenTelemetry-instrumented applications
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # Collect host-level metrics for the Infrastructure List
      host_metrics:
        root_path: /hostfs # Necessary inside containers, corresponds to / on host
        collection_interval: 10s
        scrapers:
          cpu:
            metrics:
              system.cpu.utilization:
                enabled: true
              system.cpu.physical.count:
                enabled: true
              system.cpu.logical.count:
                enabled: true
              system.cpu.frequency:
                enabled: true
          memory:
            metrics:
              system.memory.limit:
                enabled: true
          paging:
            metrics:
              system.paging.utilization:
                enabled: true
              system.paging.usage:
                enabled: true
          disk: {}
          filesystem:
            metrics:
              system.filesystem.utilization:
                enabled: true
          load: {}
          network: {}
          processes: {}
    
    processors:
      # Detect host and cloud metadata for hostname resolution and tagging
      resourcedetection:
        detectors: [eks, ec2, env]
        timeout: 2s
        override: true # Disable if incoming attributes (especially host.name) are verified correct
        eks:
          resource_attributes:
            k8s.cluster.name: { enabled: true }
        ec2:
          tags: ['^kubernetes\.io/cluster/.*$']
      k8s_attributes:
        extract:
          otel_annotations: true
          metadata:
            - k8s.node.name
            - k8s.namespace.name
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.pod.uid
            - k8s.pod.name
            - container.id
            - k8s.container.name
            - container.image.name
            - container.image.tag
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: connection
    
      # Transform metrics to fit Datadog platform constraints
      cumulativetodelta: {}
    
      # Runtime metric mapping adapted from https://docs.datadoghq.com/opentelemetry/integrations/runtime_metrics
      deltatocumulative: {}
      transform/cumul_sum_to_gauge:
        error_mode: ignore
        metric_statements:
          - context: metric
            statements:
              - convert_sum_to_gauge()
      deltatorate:
        metrics:
          # JVM runtime metrics
          - jvm.gc.collections.count
          - jvm.gc.collections.elapsed
          # .NET runtime metrics
          - dotnet.process.cpu.time
          - process.cpu.time
          # System metrics
          - system.network.io
      transform/rate_to_gauge:
        error_mode: ignore
        metric_statements:
          - context: metric
            statements:
              - convert_sum_to_gauge() where metric.name == "system.network.io"
    
    connectors:
      # Generate RED (Rate, Error, Duration) metrics from traces for APM
      span_metrics:
        # Note: Spans without service.name will be ignored
        aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
        add_resource_attributes: true
        histogram:
          exponential: {}
          unit: s
        dimensions:
          # (Duplicate dimensions are not allowed and are thus commented out)
        
          ## Unified Service Tagging
          - name: deployment.environment.name
          - name: service.version
          - name: http.response.status_code
        
          ## Container tags
          ## May be used as additional primary tags or in service remapping rules
          - name: container.id # Required for correct aggregation
        
          ## Host name inference
          - name: aws.ecs.launchtype
          - name: aws.ecs.task.arn
          - name: cloud.provider
          - name: cloud.account.id
          - name: host.id
          - name: host.name
          - name: k8s.node.name
          - name: k8s.cluster.name
          - name: azure.resourcegroup.name
        
          ## Peer service inference
          - name: aws.s3.bucket
          - name: db.namespace
          - name: messaging.destination.name
          - name: messaging.system
          - name: server.address
        
          ## Operation name inference
          - name: operation.name
          - name: http.request.method
          - name: http.method
          - name: db.system
          #- name: messaging.system
          - name: messaging.operation
          - name: rpc.system
          - name: rpc.service
          - name: faas.invoked_provider
          - name: faas.invoked_name
          - name: faas.trigger
          - name: graphql.operation.type
          - name: network.protocol.name
        
          ## Resource name inference
          - name: resource.name
          #- name: http.request.method
          #- name: http.method
          - name: http.route
          #- name: messaging.operation
          - name: messaging.destination
          #- name: messaging.destination.name
          - name: rpc.method
          #- name: rpc.service
          #- name: graphql.operation.type
          - name: graphql.operation.name
          #- name: db.system
          - name: db.statement
          - name: db.query.text
        
          ## Optional container tags
          ## May be used as additional primary tags or in service remapping rules
          # - name: container.name
          # - name: container.image.name
          # - name: container.image.tag
          # - name: container.runtime
          # # - name: cloud.provider
          # - name: cloud.region
          # - name: cloud.availability_zone
          # - name: aws.ecs.task.family
          # # - name: aws.ecs.task.arn
          # - name: aws.ecs.cluster.arn
          # - name: aws.ecs.task.revision
          # - name: aws.ecs.container.arn
          # - name: k8s.container.name
          # # - name: k8s.cluster.name
          # - name: k8s.deployment.name
          # - name: k8s.replicaset.name
          # - name: k8s.statefulset.name
          # - name: k8s.daemonset.name
          # - name: k8s.job.name
          # - name: k8s.cronjob.name
          # - name: k8s.namespace.name
          # - name: k8s.pod.name
      # Separate trace processing from sampling so span metrics are computed on all traces
      forward/traces_sample: {}
      # Runtime metric mapping adapted from https://docs.datadoghq.com/opentelemetry/integrations/runtime_metrics
      routing/metrics:
        default_pipelines: [metrics/default]
        table:
          - context: metric
            condition: ContainsValue([
                "process.runtime.go.gc.pause_total_ns",
                "process.runtime.go.gc.count",
                "go.memory.allocated",
                "go.memory.allocations"
              ], metric.name)
            pipelines: [metrics/cumul_sum_to_gauge]
      forward/metrics_default: {}
    
    exporters:
      debug:
        verbosity: detailed
      # Send telemetry to Datadog's OTLP intake endpoints
      otlp_http:
        endpoint: https://otlp.${env:DD_SITE}
        metrics_endpoint: https://otlp.${env:DD_SITE}/api/v2/otlpmetrics
        headers:
          dd-api-key: ${env:DD_API_KEY}
          # Send resource attributes and scope metadata as metric tags
          dd-otel-metric-config: >-
            {
            "resource_attributes_as_tags": true,
            "instrumentation_scope_metadata_as_tags": true
            }
        compression: zstd
        compression_params:
          level: 3 # Level must be set explicitly for zstd
        sending_queue:
          batch: {} # Default batch settings
    
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      # Report Collector status to Datadog for Fleet Automation
      datadog:
        api:
          site: ${env:DD_SITE}
          key: ${env:DD_API_KEY}
        deployment_type: daemonset
    
    service:
      extensions:
        - health_check # May be necessary for liveness/readiness probe
        - datadog
      
      pipelines:
        logs:
          receivers: [otlp]
          processors:
            - k8s_attributes
            - resourcedetection
          exporters: [otlp_http]
        
        metrics:
          receivers: [otlp, host_metrics]
          processors:
            - k8s_attributes
            - resourcedetection
          exporters: [routing/metrics]
        
        metrics/cumul_sum_to_gauge:
          receivers: [routing/metrics]
          processors:
            - deltatocumulative
            - transform/cumul_sum_to_gauge
          exporters: [forward/metrics_default]
        
        metrics/default:
          receivers: [routing/metrics, forward/metrics_default]
          processors:
            - cumulativetodelta
            - deltatorate
            - transform/rate_to_gauge
          exporters: [otlp_http]
        
        traces:
          receivers: [otlp]
          processors:
            - k8s_attributes
            - resourcedetection
          exporters: [forward/traces_sample, span_metrics]
        
        traces/sample:
          receivers: [forward/traces_sample]
          # Add sampling processors here (for example, tail_sampling) before exporting traces
          exporters: [otlp_http]
        
        metrics/span_metrics:
          receivers: [span_metrics]
          exporters: [otlp_http]
      
      telemetry:
        # Route Collector internal metrics through its own pipelines for enrichment purposes
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://localhost:4318

components:
  ad:
    mountedConfigMaps:
      - name: otel-jmx-rules
        mountPath: /etc/otel-jmx
        existingConfigMap: kafka-otel-jmx-rules
  fraud-detection:
    mountedConfigMaps:
      - name: otel-jmx-rules
        mountPath: /etc/otel-jmx
        existingConfigMap: kafka-otel-jmx-rules
  kafka:
    mountedConfigMaps:
      - name: otel-jmx-rules
        mountPath: /etc/otel-jmx
        data:
          jvm.yaml: |
            ---
            
            rules:
            
              - bean: java.lang:type=ClassLoading
                mapping:
                  LoadedClassCount:
                    metric: jvm.classes.loaded
                    type: gauge
                    unit: "{class}"
                    desc: number of loaded classes
            
              - bean: java.lang:type=GarbageCollector,name=*
                mapping:
                  CollectionCount:
                    metric: jvm.gc.collections.count
                    type: counter
                    unit: "{collection}"
                    desc: total number of collections that have occurred
                    metricAttribute:
                      name: param(name)
                  CollectionTime:
                    metric: jvm.gc.collections.elapsed
                    type: counter
                    unit: ms
                    desc: the approximate accumulated collection elapsed time in milliseconds
                    metricAttribute:
                      name: param(name)
            
              - bean: java.lang:type=Memory
                unit: By
                prefix: jvm.memory.
                mapping:
                  HeapMemoryUsage.committed:
                    metric: heap.committed
                    desc: current heap usage
                    type: gauge
                  HeapMemoryUsage.init:
                    metric: heap.init
                    desc: current heap usage
                    type: gauge
                  HeapMemoryUsage.max:
                    metric: heap.max
                    desc: current heap usage
                    type: gauge
                  HeapMemoryUsage.used:
                    metric: heap.used
                    desc: current heap usage
                    type: gauge
                  NonHeapMemoryUsage.committed:
                    metric: nonheap.committed
                    desc: current non-heap usage
                    type: gauge
                  NonHeapMemoryUsage.init:
                    metric: nonheap.init
                    desc: current non-heap usage
                    type: gauge
                  NonHeapMemoryUsage.max:
                    metric: nonheap.max
                    desc: current non-heap usage
                    type: gauge
                  NonHeapMemoryUsage.used:
                    metric: nonheap.used
                    desc: current non-heap usage
                    type: gauge
            
              - bean: java.lang:type=MemoryPool,name=*
                type: gauge
                unit: By
                metricAttribute:
                  name: param(name)
                mapping:
                  Usage.committed:
                    metric: jvm.memory.pool.committed
                    desc: current memory pool usage
                  Usage.init:
                    metric: jvm.memory.pool.init
                    desc: current memory pool usage
                  Usage.max:
                    metric: jvm.memory.pool.max
                    desc: current memory pool usage
                  Usage.used:
                    metric: jvm.memory.pool.used
                    desc: current memory pool usage
            
              - bean: java.lang:type=Threading
                mapping:
                  ThreadCount:
                    metric: jvm.threads.count
                    unit: "{thread}"
                    desc: number of threads
