# FOR INTERNAL TESTING PURPOSES ONLY
# Recommended OpenTelemetry Collector configuration
# Setup: Uncontainerized Agent in a non-cloud environment
# Collector Contrib version: v0.150.1
# Required Collector flags: --feature-gates connector.spanmetrics.includeCollectorInstanceID
# Required environment variables: DD_SITE, DD_API_KEY

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.physical.count:
            enabled: true
          system.cpu.logical.count:
            enabled: true
          system.cpu.frequency:
            enabled: true
      memory:
        metrics:
          system.memory.limit:
            enabled: true
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
          system.paging.usage:
            enabled: true
      disk: {}
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      network: {}
      processes: {}

processors:
  # Enrich telemetry with host metadata
  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: true # Disable if incoming attributes (especially host.name) are verified correct
    system:
      resource_attributes:
        host.arch:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true

  # Transform metrics to fit Datadog platform constraints
  cumulativetodelta: {}

  # Runtime metric mapping adapted from https://docs.datadoghq.com/opentelemetry/integrations/runtime_metrics
  deltatocumulative: {}
  transform/sum_to_gauge:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - convert_sum_to_gauge()
  deltatorate/runtime_metrics:
    metrics:
      # JVM runtime metrics
      - jvm.gc.collections.count
      - jvm.gc.collections.elapsed
      # .NET runtime metrics
      - dotnet.process.cpu.time
      - process.cpu.time

connectors:
  spanmetrics:
    # Note: Spans without service.name will be ignored
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    add_resource_attributes: true
    histogram:
      exponential: {}
      unit: s
    dimensions:
      # (Duplicate dimensions are not allowed and are thus commented out)
    
      ## Unified Service Tagging
      - name: deployment.environment.name
      - name: service.version
      - name: http.response.status_code
    
      ## Container tags
      - name: container.id
      - name: container.name
      - name: container.image.name
      - name: container.image.tag
      - name: container.runtime
      - name: cloud.provider
      - name: cloud.region
      - name: cloud.availability_zone
      - name: aws.ecs.task.family
      - name: aws.ecs.task.arn
      - name: aws.ecs.cluster.arn
      - name: aws.ecs.task.revision
      - name: aws.ecs.container.arn
      - name: k8s.container.name
      - name: k8s.cluster.name
      - name: k8s.deployment.name
      - name: k8s.replicaset.name
      - name: k8s.statefulset.name
      - name: k8s.daemonset.name
      - name: k8s.job.name
      - name: k8s.cronjob.name
      - name: k8s.namespace.name
      - name: k8s.pod.name
    
      ## Host name inference
      - name: aws.ecs.launchtype
      #- name: aws.ecs.task.arn
      #- name: cloud.provider
      - name: cloud.account.id
      - name: host.id
      - name: host.name
      - name: k8s.node.name
      #- name: k8s.cluster.name
      - name: azure.resourcegroup.name
    
      ## Peer service inference
      - name: aws.s3.bucket
      - name: db.namespace
      - name: messaging.destination.name
      - name: messaging.system
      - name: server.address
    
      ## Operation name inference
      - name: operation.name
      - name: http.request.method
      - name: http.method
      - name: db.system
      #- name: messaging.system
      - name: messaging.operation
      - name: rpc.system
      - name: rpc.service
      - name: faas.invoked_provider
      - name: faas.invoked_name
      - name: faas.trigger
      - name: graphql.operation.type
      - name: network.protocol.name
    
      ## Resource name inference
      - name: resource.name
      #- name: http.request.method
      #- name: http.method
      - name: http.route
      #- name: messaging.operation
      - name: messaging.destination
      #- name: messaging.destination.name
      - name: rpc.method
      #- name: rpc.service
      #- name: graphql.operation.type
      - name: graphql.operation.name
      #- name: db.system
      - name: db.statement
      - name: db.query.text
  forward/traces_sample: {}
  # Runtime metric mapping adapted from https://docs.datadoghq.com/opentelemetry/integrations/runtime_metrics
  routing/metrics:
    default_pipelines: [metrics/default]
    table:
      - context: metric
        condition: ContainsValue([
            "process.runtime.go.gc.pause_total_ns",
            "process.runtime.go.gc.count",
            "go.memory.allocated",
            "go.memory.allocations"
          ], metric.name)
        pipelines: [metrics/sum_to_gauge]
  forward/metrics_default: {}

exporters:
  debug:
    verbosity: detailed
  otlp_http:
    endpoint: https://otlp.${env:DD_SITE}
    metrics_endpoint: https://otlp.${env:DD_SITE}/api/v2/otlpmetrics
    headers:
      dd-api-key: ${env:DD_API_KEY}
      dd-otel-metric-config: >-
        {
        "resource_attributes_as_tags": true,
        "instrumentation_scope_metadata_as_tags": true
        }
    compression: zstd
    compression_params:
      level: 3 # Level must be set explicitly for zstd
    sending_queue:
      batch: {} # Default batch settings

extensions:
  datadog:
    api:
      site: ${env:DD_SITE}
      key: ${env:DD_API_KEY}
    deployment_type: daemonset

service:
  extensions:
    - datadog
  
  pipelines:
    logs:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [otlp_http]
    
    metrics:
      receivers: [otlp, hostmetrics]
      processors:
        - resourcedetection
      exporters: [routing/metrics]
    
    metrics/sum_to_gauge:
      receivers: [routing/metrics]
      processors:
        - deltatocumulative
        - transform/sum_to_gauge
      exporters: [forward/metrics_default]
    
    metrics/default:
      receivers: [routing/metrics, forward/metrics_default]
      processors:
        - cumulativetodelta
        - deltatorate/runtime_metrics
      exporters: [otlp_http]
    
    traces:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [forward/traces_sample, spanmetrics]
    
    traces/sample:
      receivers: [forward/traces_sample]
      # Perform any sampling here
      exporters: [otlp_http]
    
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [otlp_http]
  
  telemetry:
    # Self-monitoring is not recommended, but currently the simplest way to perform enriching
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://localhost:4318
