# Recommended values.yaml for the OpenTelemetry Collector Helm Chart
# Setup: Kubernetes Daemonset in an EKS environment
# Required secrets: datadog-secrets::api-key
# Remember to modify DD_SITE if not using datadoghq.com

extraEnvs:
  - name: DD_SITE
    value: datadoghq.com # Update if necessary
  - name: DD_API_KEY
    valueFrom:
      secretKeyRef:
        name: datadog-secrets
        key: api-key
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.152.0
command:
  name: "otelcol-contrib"
  extraArgs: []

# Service account for the k8s_attributes processor
serviceAccount:
  create: true
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes", "nodes/stats"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["extensions"]
      resources: ["replicasets"]
      verbs: ["get", "list", "watch"]

# Volume mount for the host metrics receiver
extraVolumes:
  - name: hostfs
    hostPath:
      path: /
extraVolumeMounts:
  - name: hostfs
    mountPath: /hostfs
    readOnly: true
    mountPropagation: HostToContainer

# Some components take a long time to start, so set a startup probe
startupProbe:
  initialDelaySeconds: 1
  periodSeconds: 2
  failureThreshold: 20 # 40 seconds
  httpGet:
    port: 13133
    path: /

alternateConfig:
  receivers:
    # Receive telemetry from OpenTelemetry-instrumented applications
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    # Collect host-level metrics for the Infrastructure List
    host_metrics:
      root_path: /hostfs # Necessary inside containers, corresponds to / on host
      collection_interval: 10s
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
            system.cpu.physical.count:
              enabled: true
            system.cpu.logical.count:
              enabled: true
            system.cpu.frequency:
              enabled: true
        memory:
          metrics:
            system.memory.limit:
              enabled: true
        paging:
          metrics:
            system.paging.utilization:
              enabled: true
            system.paging.usage:
              enabled: true
        disk: {}
        filesystem:
          metrics:
            system.filesystem.utilization:
              enabled: true
        load: {}
        network: {}
        processes: {}
    kubelet_stats:
      collection_interval: 15s
      auth_type: "serviceAccount"
      endpoint: "${env:K8S_NODE_NAME}:10250"
      node: "${env:K8S_NODE_NAME}"
      insecure_skip_verify: true
      metric_groups:
        - node
        - pod
        - container
        - volume
      metrics:
        k8s.container.cpu.node.utilization:
          enabled: true
        k8s.pod.cpu.node.utilization:
          enabled: true
        k8s.container.memory.node.utilization:
          enabled: true
        k8s.pod.memory.node.utilization:
          enabled: true
  
  processors:
    # Detect host and cloud metadata for hostname resolution and tagging
    resourcedetection:
      detectors: [eks, ec2, env]
      timeout: 2s
      override: true # Disable if incoming attributes (especially host.name) are verified correct
      eks:
        resource_attributes:
          k8s.cluster.name: { enabled: true }
      ec2:
        tags: ['^kubernetes\.io/cluster/.*$']
    k8s_attributes:
      extract:
        otel_annotations: true
        metadata:
          - k8s.node.name
          - k8s.namespace.name
          - service.namespace
          - service.name
          - service.version
          - service.instance.id
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.daemonset.name
          - k8s.statefulset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.pod.uid
          - k8s.pod.name
          - container.id
          - k8s.container.name
          - container.image.name
          - container.image.tag
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        - sources:
            - from: connection
  
    # Transform metrics to fit Datadog platform constraints
    cumulativetodelta: {}
    deltatorate:
      metrics:
        - k8s.pod.network.io
        - k8s.pod.network.errors
  
  connectors:
    # Generate RED (Rate, Error, Duration) metrics from traces for APM
    span_metrics:
      # Note: Spans without service.name will be ignored
      aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
      add_resource_attributes: true
      histogram:
        exponential: {}
        unit: s
      dimensions:
        # (Duplicate dimensions are not allowed and are thus commented out)
      
        ## Unified Service Tagging
        - name: deployment.environment.name
        - name: service.version
        - name: http.response.status_code
      
        ## Container tags
        ## May be used as additional primary tags or in service remapping rules
        - name: container.id # Required for correct aggregation
      
        ## Host name inference
        - name: aws.ecs.launchtype
        - name: aws.ecs.task.arn
        - name: cloud.provider
        - name: cloud.account.id
        - name: host.id
        - name: host.name
        - name: k8s.node.name
        - name: k8s.cluster.name
        - name: azure.resourcegroup.name
      
        ## Peer service inference
        - name: aws.s3.bucket
        - name: db.namespace
        - name: messaging.destination.name
        - name: messaging.system
        - name: server.address
      
        ## Operation name inference
        - name: operation.name
        - name: http.request.method
        - name: http.method
        - name: db.system
        #- name: messaging.system
        - name: messaging.operation
        - name: rpc.system
        - name: rpc.service
        - name: faas.invoked_provider
        - name: faas.invoked_name
        - name: faas.trigger
        - name: graphql.operation.type
        - name: network.protocol.name
      
        ## Resource name inference
        - name: resource.name
        #- name: http.request.method
        #- name: http.method
        - name: http.route
        #- name: messaging.operation
        - name: messaging.destination
        #- name: messaging.destination.name
        - name: rpc.method
        #- name: rpc.service
        #- name: graphql.operation.type
        - name: graphql.operation.name
        #- name: db.system
        - name: db.statement
        - name: db.query.text
      
        ## Optional container tags
        ## May be used as additional primary tags or in service remapping rules
        # - name: container.name
        # - name: container.image.name
        # - name: container.image.tag
        # - name: container.runtime
        # # - name: cloud.provider
        # - name: cloud.region
        # - name: cloud.availability_zone
        # - name: aws.ecs.task.family
        # # - name: aws.ecs.task.arn
        # - name: aws.ecs.cluster.arn
        # - name: aws.ecs.task.revision
        # - name: aws.ecs.container.arn
        # - name: k8s.container.name
        # # - name: k8s.cluster.name
        # - name: k8s.deployment.name
        # - name: k8s.replicaset.name
        # - name: k8s.statefulset.name
        # - name: k8s.daemonset.name
        # - name: k8s.job.name
        # - name: k8s.cronjob.name
        # - name: k8s.namespace.name
        # - name: k8s.pod.name
    # Separate trace processing from sampling so span metrics are computed on all traces
    forward/traces_sample: {}
  
  exporters:
    debug:
      verbosity: detailed
    # Send telemetry to Datadog's OTLP intake endpoints
    otlp_http:
      endpoint: https://otlp.${env:DD_SITE}
      headers:
        dd-api-key: ${env:DD_API_KEY}
        # Send resource attributes and scope metadata as metric tags
        dd-otel-metric-config: >-
          {
          "resource_attributes_as_tags": true,
          "instrumentation_scope_metadata_as_tags": true
          }
      compression: zstd
      compression_params:
        level: 3 # Level must be set explicitly for zstd
      sending_queue:
        batch: {} # Default batch settings
  
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
    # Report Collector status to Datadog for Fleet Automation
    datadog:
      api:
        site: ${env:DD_SITE}
        key: ${env:DD_API_KEY}
      deployment_type: daemonset
  
  service:
    extensions:
      - health_check # May be necessary for liveness/readiness probe
      - datadog
    
    pipelines:
      logs:
        receivers: [otlp]
        processors:
          - k8s_attributes
          - resourcedetection
        exporters: [otlp_http]
      
      metrics:
        receivers: [otlp, host_metrics, kubelet_stats]
        processors:
          - k8s_attributes
          - resourcedetection
          - cumulativetodelta
          - deltatorate
        exporters: [otlp_http]
      
      traces:
        receivers: [otlp]
        processors:
          - k8s_attributes
          - resourcedetection
        exporters: [forward/traces_sample, span_metrics]
      
      traces/sample:
        receivers: [forward/traces_sample]
        # Add sampling processors here (for example, tail_sampling) before exporting traces
        exporters: [otlp_http]
      
      metrics/span_metrics:
        receivers: [span_metrics]
        exporters: [otlp_http]
    
    telemetry:
      # Route Collector internal metrics through its own pipelines for enrichment purposes
      metrics:
        readers:
          - periodic:
              exporter:
                otlp:
                  protocol: http/protobuf
                  endpoint: http://localhost:4318
