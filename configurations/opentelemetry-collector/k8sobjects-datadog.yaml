# Recommended OpenTelemetry Collector configuration (Deployment mode)
# Paired with daemonset.yaml to collect cluster level resources to support K8s Explorer
# Setup: Kubernetes per-cluster Deployment (k8sobjects) in a non-cloud environment
# Collector Contrib version: v0.150.1
# Required environment variables:
# - DD_SITE: Datadog site for your region, e.g. datadog.com
# - DD_API_KEY: A Datadog API key
# - OTEL_K8S_CLUSTER_NAME: The name of the Kubernetes cluster

receivers:
  k8s_cluster:
    auth_type: serviceAccount
  # Prometheus receiver is used to scrape kube state metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: "kube-state-metrics"
          metrics_path: /metrics
          scheme: http
          static_configs:
            - targets:
                - kube-state-metrics.default.svc:8080
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: "kube_daemonset_.*|kube_deployment_.*|kube_job_.*|kube_namespace_.*|kube_node_.*|kube_pod_.*|kube_replicaset_.*|kube_statefulset_.*|kube_service_spec_type"
              action: keep
  # k8sobjects receiver for orchestrator check
  k8sobjects:
    auth_type: serviceAccount
    objects:
      - name: namespaces
        mode: pull
        interval: 3m
      - name: namespaces
        mode: watch
      - name: pods
        mode: pull
        interval: 3m
      - name: pods
        mode: watch
      - name: nodes
        mode: pull
        interval: 3m
      - name: nodes
        mode: watch
      - name: replicasets
        mode: pull
        interval: 3m
      - name: replicasets
        mode: watch
      - name: daemonsets
        mode: pull
        interval: 3m
      - name: daemonsets
        mode: watch
      - name: statefulsets
        mode: pull
        interval: 3m
        group: apps
      - name: statefulsets
        mode: watch
        group: apps
      - name: cronjobs
        mode: pull
        interval: 3m
      - name: cronjobs
        mode: watch
      - name: jobs
        mode: pull
        interval: 3m
      - name: jobs
        mode: watch
      - name: services
        mode: pull
        interval: 3m
      - name: services
        mode: watch
      - name: deployments
        mode: pull
        interval: 3m
        group: apps
      - name: deployments
        mode: watch
        group: apps
      - name: roles
        mode: pull
        interval: 3m
        group: rbac.authorization.k8s.io
      - name: roles
        mode: watch
        group: rbac.authorization.k8s.io
      - name: rolebindings
        mode: pull
        interval: 3m
        group: rbac.authorization.k8s.io
      - name: rolebindings
        mode: watch
        group: rbac.authorization.k8s.io
      - name: clusterroles
        mode: pull
        interval: 3m
        group: rbac.authorization.k8s.io
      - name: clusterroles
        mode: watch
        group: rbac.authorization.k8s.io
      - name: clusterrolebindings
        mode: pull
        interval: 3m
        group: rbac.authorization.k8s.io
      - name: clusterrolebindings
        mode: watch
        group: rbac.authorization.k8s.io
      - name: storageclasses
        mode: pull
        interval: 3m
        group: storage.k8s.io
      - name: storageclasses
        mode: watch
        group: storage.k8s.io
      - name: networkpolicies
        mode: pull
        interval: 3m
        group: networking.k8s.io
      - name: networkpolicies
        mode: watch
        group: networking.k8s.io
      - name: ingresses
        mode: pull
        interval: 3m
        group: networking.k8s.io
      - name: ingresses
        mode: watch
        group: networking.k8s.io
      - name: persistentvolumes
        mode: pull
        interval: 3m
      - name: persistentvolumes
        mode: watch
      - name: persistentvolumeclaims
        mode: pull
        interval: 3m
      - name: persistentvolumeclaims
        mode: watch
      - name: poddisruptionbudgets
        mode: pull
        interval: 3m
        group: policy
      - name: poddisruptionbudgets
        mode: watch
        group: policy
      - name: serviceaccounts
        mode: pull
        interval: 3m
      - name: serviceaccounts
        mode: watch
      - name: horizontalpodautoscalers
        mode: pull
        interval: 3m
        group: autoscaling
      - name: horizontalpodautoscalers
        mode: watch
        group: autoscaling
      - name: customresourcedefinitions
        mode: pull
        interval: 3m
        group: apiextensions.k8s.io
      - name: customresourcedefinitions
        mode: watch
        group: apiextensions.k8s.io

processors:
  cumulativetodelta: {}
  # Rename KSM metric prometheus label uid -> k8s.pod.uid to adhere to OTel standard and
  # facilitate the groupby specified below.
  transform/rename_uid:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["k8s.pod.uid"], attributes["uid"])
          - delete_key(attributes, "uid")
      # We have to delete these from the resource because they were incorrectly
      # set by the prometheus receiver, k8sattributes will repopulate them but
      # cannot overwrite them.
      - context: resource
        statements:
          - delete_key(attributes, "service.name")
          - delete_key(attributes, "service.instance.id")
  # Grouping by k8s.pod.uid (a globally unique ID) correctly associates the
  # kube-state-metrics pod metrics with their respective OTel resources.
  groupbyattrs:
    keys:
      - k8s.pod.uid
  # Modify kube-state-metric Datapoint attributes so that they adhere to Datadog's
  # expected schema.
  transform/ksm_to_dd:
    metric_statements:
      - context: datapoint
        statements:
          # statefulset
          - set(attributes["kube_namespace"], attributes["namespace"])
          - delete_key(attributes, "namespace")
    
          # statefulset
          - set(attributes["kube_deployment"], attributes["deployment"])
          - delete_key(attributes, "deployment")
    
          # phase
          - set(attributes["pod_phase"], attributes["phase"])
          - delete_key(attributes, "phase")
    
          # statefulset
          - set(attributes["kube_stateful_set"], attributes["statefulset"])
          - delete_key(attributes, "statefulset")
    
          # daemonset
          - set(attributes["kube_daemon_set"], attributes["daemonset"])
          - delete_key(attributes, "daemonset")
    
          # replicaset
          - set(attributes["kube_replica_set"], attributes["replicaset"])
          - delete_key(attributes, "replicaset")
    
          # job_name
          - set(attributes["kube_job"], attributes["job_name"])
          - delete_key(attributes, "job_name")
    
          # service
          - set(attributes["kube_service"], attributes["service"])
          - delete_key(attributes, "service")
  # k8sattributesprocessor is used to enrich metrics with additional metadata
  k8s_attributes:
    # Requires setting up ServiceAccount, (Cluster)Role, and (Cluster)RoleBinding resources
    # See https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor#role-based-access-control
    extract:
      otel_annotations: true
      metadata:
        - k8s.node.name
        - k8s.namespace.name
        - service.namespace
        - service.name
        - service.version
        - service.instance.id
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.daemonset.name
        - k8s.statefulset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.pod.uid
        - k8s.pod.name
        - container.id
        - k8s.container.name
        - container.image.name
        - container.image.tag
    # By default association is done via Pod IP, we need to override
    # this so it doesn't erroneously associate metrics with the
    # kube-state-metrics pod.
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
  transform/sum_to_gauge:
    metric_statements:
      - convert_sum_to_gauge() where metric.name == "k8s.deployment.count"
      - convert_sum_to_gauge() where metric.name == "k8s.namespace.count"
      - convert_sum_to_gauge() where metric.name == "k8s.service.count"
      - convert_sum_to_gauge() where metric.name == "k8s.node.count"
      - convert_sum_to_gauge() where metric.name == "k8s.pod.count"
      - convert_sum_to_gauge() where metric.name == "k8s.job.count"
  # Drop metric after count connector has used it
  filter/ksm:
    metrics:
      metric:
        - metric.name == "kube_service_spec_type"
  # In non-cloud environments, k8s.cluster.name must be set manually.
  # Set the OTEL_K8S_CLUSTER_NAME environment variable with your actual cluster name.
  resource/add-cluster-name:
    attributes:
      - key: k8s.cluster.name
        value: "${env:OTEL_K8S_CLUSTER_NAME}"
        action: upsert
  resourcedetection:
    detectors: [env, kubeadm, system]
    timeout: 2s
    override: true # Disable if incoming attributes (especially host.name) are verified correct
    # kubeadm detector is required by the k8sobjects receiver to add k8s.cluster.uid into attributes
    kubeadm:
      resource_attributes:
        k8s.cluster.name:
          enabled: false
    system:
      resource_attributes:
        host.arch:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true
connectors:
  # The count connector generates custom metrics by counting the number
  # of metric series.
  count:
    datapoints:
      k8s.service.count:
        # k8s.service.count is grouped by namespace and type
        # so we have to grab those attributes from the original metric.
        attributes:
          - key: namespace
            default_value: unspecified_namespace
          - key: type
            default_value: unspecified_service_type
        conditions:
          - metric.name == "kube_service_spec_type"
    
      k8s.deployment.count:
        conditions:
          - metric.name == "kube_deployment_created"
    
      k8s.namespace.count:
        conditions:
          - metric.name == "kube_namespace_created"
    
      k8s.node.count:
        conditions:
          - metric.name == "kube_node_info"
    
      k8s.pod.count:
        conditions:
          - metric.name == "kube_pod_created"
    
      k8s.job.count:
        conditions:
          - metric.name == "kube_job_owner"

exporters:
  debug:
    verbosity: detailed
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}
    hostname_detection_timeout: 5s
    metrics:
      resource_attributes_as_tags: true
      instrumentation_scope_metadata_as_tags: true
    sending_queue:
      batch: {} # Default batch settings
    orchestrator_explorer:
      enabled: true
  otlp_http:
    endpoint: https://otlp.${env:DD_SITE}
    metrics_endpoint: https://otlp.${env:DD_SITE}/api/v2/otlpmetrics
    headers:
      dd-api-key: ${env:DD_API_KEY}
      dd-otel-metric-config: >-
        {
        "resource_attributes_as_tags": true,
        "instrumentation_scope_metadata_as_tags": true
        }
    compression: zstd
    compression_params:
      level: 3 # Level must be set explicitly for zstd
    sending_queue:
      batch: {} # Default batch settings

extensions:
  health_check:
    endpoint: ${env:MY_POD_IP}:13133

service:
  extensions:
    - health_check

  pipelines:
    logs/orchestrator:
      receivers: [k8sobjects]
      processors: [resource/add-cluster-name, resourcedetection]
      exporters: [datadog]

    metrics/cluster:
      receivers: [k8s_cluster]
      processors: [resource/add-cluster-name, resourcedetection]
      exporters: [otlp_http]
    metrics/count:
      receivers: [prometheus]
      exporters: [count]

    metrics/ksm:
      receivers: [prometheus, count]
      processors:
        - filter/ksm
        - resource/add-cluster-name
        - resourcedetection
        - transform/ksm_to_dd
        - transform/rename_uid
        - groupbyattrs
        - k8s_attributes
        - cumulativetodelta
        - transform/sum_to_gauge
      exporters: [otlp_http]
