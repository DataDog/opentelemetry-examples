# Recommended OpenTelemetry Collector configuration
# Setup: Containerized Agent in a non-cloud environment
# Collector Contrib version: v0.152.0
# Required environment variables:
# - DD_SITE: Datadog site for your region, e.g. datadog.com
# - DD_API_KEY: A Datadog API key
# - OTEL_RESOURCE_ATTRIBUTES: Host information (no host detection possible in this setup)
# Required mounts: /hostfs

receivers:
  # Receive telemetry from OpenTelemetry-instrumented applications
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Collect host-level metrics for the Infrastructure List
  host_metrics:
    root_path: /hostfs # Necessary inside containers, corresponds to / on host
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.physical.count:
            enabled: true
          system.cpu.logical.count:
            enabled: true
          system.cpu.frequency:
            enabled: true
      memory:
        metrics:
          system.memory.limit:
            enabled: true
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
          system.paging.usage:
            enabled: true
      disk: {}
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      network: {}
      processes: {}

processors:
  # Detect host and cloud metadata for hostname resolution and tagging
  resourcedetection:
    detectors: [env]
    timeout: 2s
    override: true # Disable if incoming attributes (especially host.name) are verified correct

  # Transform metrics to fit Datadog platform constraints
  cumulativetodelta: {}

connectors:
  # Generate RED (Rate, Error, Duration) metrics from traces for APM
  span_metrics:
    # Note: Spans without service.name will be ignored
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    add_resource_attributes: true
    histogram:
      exponential: {}
      unit: s
    dimensions:
      # (Duplicate dimensions are not allowed and are thus commented out)
    
      ## Unified Service Tagging
      - name: deployment.environment.name
      - name: service.version
      - name: http.response.status_code
    
      ## Container tags
      ## May be used as additional primary tags or in service remapping rules
      - name: container.id # Required for correct aggregation
    
      ## Host name inference
      - name: aws.ecs.launchtype
      - name: aws.ecs.task.arn
      - name: cloud.provider
      - name: cloud.account.id
      - name: host.id
      - name: host.name
      - name: k8s.node.name
      - name: k8s.cluster.name
      - name: azure.resourcegroup.name
    
      ## Peer service inference
      - name: aws.s3.bucket
      - name: db.namespace
      - name: messaging.destination.name
      - name: messaging.system
      - name: server.address
    
      ## Operation name inference
      - name: operation.name
      - name: http.request.method
      - name: http.method
      - name: db.system
      #- name: messaging.system
      - name: messaging.operation
      - name: rpc.system
      - name: rpc.service
      - name: faas.invoked_provider
      - name: faas.invoked_name
      - name: faas.trigger
      - name: graphql.operation.type
      - name: network.protocol.name
    
      ## Resource name inference
      - name: resource.name
      #- name: http.request.method
      #- name: http.method
      - name: http.route
      #- name: messaging.operation
      - name: messaging.destination
      #- name: messaging.destination.name
      - name: rpc.method
      #- name: rpc.service
      #- name: graphql.operation.type
      - name: graphql.operation.name
      #- name: db.system
      - name: db.statement
      - name: db.query.text
    
      ## Optional container tags
      ## May be used as additional primary tags or in service remapping rules
      # - name: container.name
      # - name: container.image.name
      # - name: container.image.tag
      # - name: container.runtime
      # # - name: cloud.provider
      # - name: cloud.region
      # - name: cloud.availability_zone
      # - name: aws.ecs.task.family
      # # - name: aws.ecs.task.arn
      # - name: aws.ecs.cluster.arn
      # - name: aws.ecs.task.revision
      # - name: aws.ecs.container.arn
      # - name: k8s.container.name
      # # - name: k8s.cluster.name
      # - name: k8s.deployment.name
      # - name: k8s.replicaset.name
      # - name: k8s.statefulset.name
      # - name: k8s.daemonset.name
      # - name: k8s.job.name
      # - name: k8s.cronjob.name
      # - name: k8s.namespace.name
      # - name: k8s.pod.name
  # Separate trace processing from sampling so span metrics are computed on all traces
  forward/traces_sample: {}

exporters:
  debug:
    verbosity: detailed
  # Send telemetry to Datadog's OTLP intake endpoints
  otlp_http:
    endpoint: https://otlp.${env:DD_SITE}
    metrics_endpoint: https://otlp.${env:DD_SITE}/api/v2/otlpmetrics
    headers:
      dd-api-key: ${env:DD_API_KEY}
      # Send resource attributes and scope metadata as metric tags
      dd-otel-metric-config: >-
        {
        "resource_attributes_as_tags": true,
        "instrumentation_scope_metadata_as_tags": true
        }
    compression: zstd
    compression_params:
      level: 3 # Level must be set explicitly for zstd
    sending_queue:
      batch: {} # Default batch settings

extensions:
  # Report Collector status to Datadog for Fleet Automation
  datadog:
    api:
      site: ${env:DD_SITE}
      key: ${env:DD_API_KEY}
    deployment_type: daemonset

service:
  extensions:
    - datadog
  
  pipelines:
    logs:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [otlp_http]
    
    metrics:
      receivers: [otlp, host_metrics]
      processors:
        - resourcedetection
        - cumulativetodelta
      exporters: [otlp_http]
    
    traces:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [forward/traces_sample, span_metrics]
    
    traces/sample:
      receivers: [forward/traces_sample]
      # Add sampling processors here (for example, tail_sampling) before exporting traces
      exporters: [otlp_http]
    
    metrics/span_metrics:
      receivers: [span_metrics]
      exporters: [otlp_http]
  
  telemetry:
    # Route Collector internal metrics through its own pipelines for enrichment purposes
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://localhost:4318
