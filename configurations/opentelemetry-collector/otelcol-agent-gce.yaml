# Recommended OpenTelemetry Collector configuration
# Setup: Uncontainerized Agent in a GCE environment
# Collector Contrib version: v0.145.0
# Required Collector flags: --feature-gates connector.spanmetrics.includeCollectorInstanceID
# Required environment variables: DD_SITE, DD_API_KEY

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.physical.count:
            enabled: true
          system.cpu.logical.count:
            enabled: true
          system.cpu.frequency:
            enabled: true
      memory:
        metrics:
          system.memory.limit:
            enabled: true
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
          system.paging.usage:
            enabled: true
      disk: {}
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      network: {}
      processes: {}

processors:
  resourcedetection:
    detectors: [gcp, env, system]
    timeout: 2s
    override: true # Disable if incoming attributes (especially host.name) are verified correct
    system:
      resource_attributes:
        host.arch:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true
  cumulativetodelta: {}

connectors:
  forward: {}
  spanmetrics:
    # Note: Spans without service.name will be ignored
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    add_resource_attributes: true
    histogram:
      exponential: {}
      unit: s
    dimensions:
      # (Duplicate dimensions are not allowed and are thus commented out)
    
      ## Universal Service Monitoring
      - name: deployment.environment.name
      - name: service.version
      - name: http.response.status_code
    
      ## Container tags
      - name: container.id
      - name: container.name
      - name: container.image.name
      - name: container.image.tag
      - name: container.runtime
      - name: cloud.provider
      - name: cloud.region
      - name: cloud.availability_zone
      - name: aws.ecs.task.family
      - name: aws.ecs.task.arn
      - name: aws.ecs.cluster.arn
      - name: aws.ecs.task.revision
      - name: aws.ecs.container.arn
      - name: k8s.container.name
      - name: k8s.cluster.name
      - name: k8s.deployment.name
      - name: k8s.replicaset.name
      - name: k8s.statefulset.name
      - name: k8s.daemonset.name
      - name: k8s.job.name
      - name: k8s.cronjob.name
      - name: k8s.namespace.name
      - name: k8s.pod.name
    
      ## Host name inference
      - name: aws.ecs.launchtype
      #- name: aws.ecs.task.arn
      #- name: cloud.provider
      - name: cloud.account.id
      - name: host.id
      - name: host.name
      - name: k8s.node.name
      #- name: k8s.cluster.name
      - name: azure.resourcegroup.name
    
      ## Peer service inference
      - name: aws.s3.bucket
      - name: db.namespace
      - name: messaging.destination.name
      - name: messaging.system
      - name: server.address
    
      ## Operation name inference
      - name: operation.name
      - name: http.request.method
      - name: http.method
      - name: db.system
      #- name: messaging.system
      - name: messaging.operation
      - name: rpc.system
      - name: rpc.service
      - name: faas.invoked_provider
      - name: faas.invoked_name
      - name: faas.trigger
      - name: graphql.operation.type
      - name: network.protocol.name
    
      ## Resource name inference
      - name: resource.name
      #- name: http.request.method
      #- name: http.method
      - name: http.route
      #- name: messaging.operation
      - name: messaging.destination
      #- name: messaging.destination.name
      - name: rpc.method
      #- name: rpc.service
      #- name: graphql.operation.type
      - name: graphql.operation.name
      #- name: db.system
      - name: db.statement
      - name: db.query.text

exporters:
  debug:
    verbosity: detailed
  otlp_http:
    endpoint: https://otlp.${env:DD_SITE}
    metrics_endpoint: https://otlp.${env:DD_SITE}/api/v2/otlpmetrics
    headers:
      dd-api-key: ${env:DD_API_KEY}
      dd-otel-metric-config: >-
        {
        "resource_attributes_as_tags": true,
        "instrumentation_scope_metadata_as_tags": true
        }
    compression: zstd
    compression_params:
      level: 3 # Level must be set explicitly for zstd
    sending_queue:
      batch: {} # Default batch settings

extensions:
  datadog:
    api:
      site: ${env:DD_SITE}
      key: ${env:DD_API_KEY}
    deployment_type: daemonset

service:
  extensions:
    - datadog
  
  pipelines:
    logs:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [otlp_http]
    
    metrics:
      receivers: [otlp, hostmetrics]
      processors:
        - resourcedetection
        - cumulativetodelta
      exporters: [otlp_http]
    
    traces:
      receivers: [otlp]
      processors:
        - resourcedetection
      exporters: [forward, spanmetrics]
    
    traces/sampling:
      receivers: [forward]
      # Perform any sampling here
      exporters: [otlp_http]
    
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [otlp_http]
  
  telemetry:
    # Self-monitoring is not recommended, but currently the simplest way to perform enriching
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://localhost:4318
