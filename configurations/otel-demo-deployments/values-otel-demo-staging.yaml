    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: k8s.container.name=cart
  checkout:
    envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: k8s.container.name=checkout
  currency:
    envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: k8s.container.name=currency
  email:
    envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
      value: k8s.container.name=email
